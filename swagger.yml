{
  "openapi": "3.0.0",
  "info": {
    "title": "DCMS API",
    "description": "Complete Rest API for DCMS",
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "http://localhost:5000/api/v1",
      "description": "Local Server"
    },
    {
      "url": "https://dcms-api.example.com/api/v1",
      "description": "Production Server"
    }
  ],
  "tags": [
    {
      "name": "Admission"
    },
    {
      "name": "Authentication"
    }
  ],
  "components": {
    "securitySchemes": {
      "BearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "Enter JWT token - \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...\""
      }
    },
    "parameters": {
      "id": {
        "name": "id",
        "in": "path",
        "required": true,
        "description": "ID of the resource",
        "schema": {
          "type": "string"
        },
        "example": 584694654
      },
      "applicationId": {
        "name": "applicationId",
        "in": "path",
        "required": true,
        "description": "Application ID of the resource",
        "schema": {
          "type": "string"
        },
        "example": 54945464584
      }
    },
    "responses": {
      "Unauthorized": {
        "description": "Missing or invalid JWT token",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "error": "Unauthorized",
              "message": "Invalid or expired token",
              "statusCode": 401
            }
          }
        }
      },
      "Forbidden": {
        "description": "Insufficient permissions",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "error": "Forbidden",
              "message": "You do not have permission to perform this action",
              "statusCode": 403
            }
          }
        }
      },
      "NotFound": {
        "description": "Resource not found",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "error": "Not Found",
              "message": "Resource with ID 123 not found",
              "statusCode": 404
            }
          }
        }
      },
      "ServerError": {
        "description": "Internal server error",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "error": "Internal Server Error",
              "message": "Something went wrong",
              "statusCode": 500
            }
          }
        }
      },
      "ValidationError": {
        "description": "Request validation failed",
        "content": {
          "application/json": {
            "schema": {
              "type": "object",
              "properties": {
                "success": {
                  "type": "boolean",
                  "enum": [
                    false
                  ],
                  "example": false
                },
                "error": {
                  "type": "string",
                  "example": "Validation Error"
                },
                "message": {
                  "type": "string",
                  "example": "Request validation failed"
                },
                "statusCode": {
                  "type": "integer",
                  "example": 400
                },
                "details": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "field": {
                        "type": "string",
                        "example": "email"
                      },
                      "message": {
                        "type": "string",
                        "example": "Email is required"
                      }
                    }
                  }
                }
              }
            },
            "example": {
              "success": false,
              "error": "Validation Error",
              "message": "Invalid input",
              "statusCode": 400
            }
          }
        }
      }
    }
  },
  "schemas": {
    "ErrorResponse": {
      "type": "object",
      "required": [
        "success",
        "error",
        "message",
        "statusCode"
      ],
      "properties": {
        "success": {
          "type": "boolean",
          "enum": [
            false
          ],
          "example": false
        },
        "error": {
          "type": "string",
          "example": "Unauthorized"
        },
        "message": {
          "type": "string",
          "example": "Invalid or expired token"
        },
        "statusCode": {
          "type": "integer",
          "example": 401
        },
        "timestamp": {
          "type": "string",
          "format": "date-time",
          "example": "2024-01-15T10:30:00Z"
        },
        "path": {
          "type": "string",
          "example": "/api/v1/auth/me"
        }
      }
    },
    "SuccessResponse": {
      "type": "object",
      "properties": {
        "success": {
          "type": "boolean",
          "enum": [
            true
          ],
          "example": true
        },
        "message": {
          "type": "string",
          "example": "Operation completed successfully"
        },
        "data": {
          "type": "object",
          "description": "Optional response data"
        }
      }
    }
  },
  "paths": {
    "/admission": {
      "post": {
        "tags": [
          "Admission"
        ],
        "summary": "New admission",
        "description": "Create new admission",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "gender": {
                    "type": "string",
                    "enum": [
                      "Male",
                      "Female",
                      "Others"
                    ],
                    "description": "Gender of the student"
                  },
                  "firstName": {
                    "type": "string",
                    "example": "John"
                  },
                  "lastName": {
                    "type": "string",
                    "example": "Doe"
                  },
                  "className": {
                    "type": "string",
                    "example": "10th"
                  },
                  "birthDate": {
                    "type": "string",
                    "format": "date",
                    "example": "2000-01-01"
                  },
                  "phone": {
                    "type": "string",
                    "example": 8801712345678
                  },
                  "email": {
                    "type": "string",
                    "format": "email",
                    "example": "naimsorker6@gmail.com"
                  },
                  "address": {
                    "type": "string",
                    "example": "Dhaka, Bangladesh"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Admission created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "data": {
                      "type": "object",
                      "properties": {
                        "token": {
                          "type": "string",
                          "example": "eyJhbGciOiJIUzI1NiIs..."
                        },
                        "expiresIn": {
                          "type": "integer",
                          "example": 86400
                        },
                        "user": {
                          "$ref": "#/paths/~1auth~1me/get/responses/200/content/application~1json/schema/properties/data"
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          },
          "401": {
            "description": "Wrong credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/ErrorResponse"
                }
              }
            }
          },
          "403": {
            "description": "Account not active/approved",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/ErrorResponse"
                }
              }
            }
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/admissions": {
      "get": {
        "tags": [
          "Admission"
        ],
        "summary": "Get all admissions",
        "description": "Get all admissions",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "data": {
                      "type": "array",
                      "items": {
                        "$ref": "#/paths/~1admission~1%7Bid%7D/get/responses/200/content/application~1json/schema"
                      }
                    }
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/admission/{id}": {
      "get": {
        "tags": [
          "Admission"
        ],
        "summary": "Get admission by ID",
        "description": "Get admission by ID",
        "operationId": "getAdmission",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "id": {
                      "type": "integer",
                      "example": 1
                    },
                    "gender": {
                      "type": "string",
                      "enum": [
                        "Male",
                        "Female",
                        "Others"
                      ],
                      "example": "Male"
                    },
                    "firstName": {
                      "type": "string",
                      "example": "John"
                    },
                    "lastName": {
                      "type": "string",
                      "example": "Doe"
                    },
                    "className": {
                      "type": "string",
                      "example": "10th"
                    },
                    "birthDate": {
                      "type": "string",
                      "format": "date",
                      "example": "2000-01-01"
                    },
                    "phone": {
                      "type": "string",
                      "example": 8801712345678
                    },
                    "email": {
                      "type": "string",
                      "format": "email",
                      "example": [
                        "EMAIL_ADDRESS"
                      ]
                    },
                    "address": {
                      "type": "string",
                      "example": "Dhaka, Bangladesh"
                    }
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      },
      "patch": {
        "tags": [
          "Admission"
        ],
        "summary": "Update admission",
        "description": "Update admission",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "schema": {
              "type": "integer"
            },
            "required": true,
            "example": 1
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/paths/~1admission/post/requestBody/content/application~1json/schema"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/paths/~1admission~1%7Bid%7D/get/responses/200/content/application~1json/schema"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      },
      "delete": {
        "tags": [
          "Admission"
        ],
        "summary": "Delete admission",
        "description": "Delete admission",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/id",
            "required": true,
            "example": 1564565463
          }
        ],
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/paths/~1admission~1%7Bid%7D/get/responses/200/content/application~1json/schema"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/auth/login": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "User login with email or phone",
        "description": "Authenticate user and receive JWT token for subsequent requests",
        "operationId": "login",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "password"
                ],
                "properties": {
                  "email": {
                    "type": "string",
                    "format": "email",
                    "example": "naimsorker6@gmail.com"
                  },
                  "phone": {
                    "type": "string",
                    "pattern": "^\\+?[1-9]\\d{1,14}$",
                    "example": 8801712345678
                  },
                  "password": {
                    "type": "string",
                    "format": "password",
                    "minLength": 8
                  }
                },
                "anyOf": [
                  {
                    "required": [
                      "email"
                    ]
                  },
                  {
                    "required": [
                      "phone"
                    ]
                  }
                ]
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Login successful",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/paths/~1admission/post/responses/200/content/application~1json/schema"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          },
          "401": {
            "description": "Wrong credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/ErrorResponse"
                }
              }
            }
          },
          "403": {
            "description": "Account not active/approved",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/ErrorResponse"
                }
              }
            }
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/auth/forgot-password": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Request password reset",
        "description": "Send OTP or reset link to registered email or phone number",
        "operationId": "forgotPassword",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "identifier"
                ],
                "properties": {
                  "identifier": {
                    "type": "string",
                    "description": "Email or phone number",
                    "example": "student@example.com"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Reset link/OTP sent successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/SuccessResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/auth/reset-password": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Reset password with token",
        "description": "Update password using valid OTP or reset token",
        "operationId": "resetPassword",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "token",
                  "newPassword",
                  "confirmPassword"
                ],
                "properties": {
                  "token": {
                    "type": "string",
                    "description": "OTP or reset token from email/phone",
                    "example": 123456
                  },
                  "newPassword": {
                    "type": "string",
                    "format": "password",
                    "minLength": 8
                  },
                  "confirmPassword": {
                    "type": "string",
                    "format": "password"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Password updated successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/SuccessResponse"
                }
              }
            }
          },
          "400": {
            "description": "Invalid or expired token",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/ErrorResponse"
                }
              }
            }
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/auth/me": {
      "get": {
        "tags": [
          "Authentication"
        ],
        "summary": "Get current user profile",
        "description": "Returns profile information of the logged-in user",
        "operationId": "getCurrentUser",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "User profile retrieved",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean"
                    },
                    "data": {
                      "type": "object",
                      "properties": {
                        "id": {
                          "type": "integer",
                          "example": 1
                        },
                        "email": {
                          "type": "string",
                          "example": "student@example.com"
                        },
                        "phone": {
                          "type": "string",
                          "example": 8801712345678
                        },
                        "role": {
                          "type": "string",
                          "enum": [
                            "admin",
                            "student",
                            "teacher"
                          ],
                          "example": "student"
                        },
                        "name": {
                          "type": "string",
                          "example": "Naim Sorker"
                        },
                        "isActive": {
                          "type": "boolean",
                          "example": true
                        },
                        "createdAt": {
                          "type": "string",
                          "format": "date-time"
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    },
    "/auth/logout": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "User logout",
        "description": "Logout the current user by invalidating the token",
        "operationId": "logout",
        "security": [
          {
            "BearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "User logged out successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "message": {
                      "type": "string",
                      "example": "User logged out successfully"
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/auth/send-otp": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Send OTP to user",
        "description": "Send OTP to user for verification",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "identifier"
                ],
                "properties": {
                  "identifier": {
                    "type": "string",
                    "description": "Email or phone number",
                    "example": "student@example.com"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OTP sent successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/schemas/SuccessResponse"
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          }
        }
      }
    },
    "/auth/verify-otp": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Verify OTP and login",
        "description": "Verify OTP and login",
