          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "identifier",
                  "otp"
                ],
                "properties": {
                  "identifier": {
                    "type": "string",
                    "description": "Email or phone number",
                    "example": "naimsorker6@gmail.com"
                  },
                  "otp": {
                    "type": "string",
                    "description": "OTP code",
                    "example": 356877
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OTP verified successfully",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "success": {
                      "type": "boolean",
                      "example": true
                    },
                    "data": {
                      "type": "object",
                      "properties": {
                        "token": {
                          "type": "string",
                          "example": "eyJhbGciOiJIUzI1NiIs..."
                        },
                        "expiresIn": {
                          "type": "integer",
                          "example": 86400
                        },
                        "user": {
                          "$ref": "#/paths/~1auth~1me/get/responses/200/content/application~1json/schema/properties/data"
                        }
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "$ref": "#/components/responses/ValidationError"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          },
          "500": {
            "$ref": "#/components/responses/ServerError"
          }
        }
      }
    }
  }
}
