AdmissionRequest:
  type: object
  properties:
    gender:
      type: string
      enum: [Male, Female, Others]
      description: Gender of the student
    firstName:
      type: string
      example: John
    lastName:
      type: string
      example: Doe
    className:
      type: string
      example: 10th
    birthDate:
      type: string
      format: date
      example: 2000-01-01
    phone:
      type: string
      example: +8801712345678
    email:
      type: string
      format: email
      example: naimsorker6@gmail.com
    address:
      type: string
      example: Dhaka, Bangladesh


Admission:
  type: object
  properties:
    id:
      type: integer
      example: 1
    gender:
      type: string
      enum: [Male, Female, Others]
      example: Male
    firstName:
      type: string
      example: John
    lastName:
      type: string
      example: Doe
    className:
      type: string
      example: 10th
    birthDate:
      type: string
      format: date
      example: 2000-01-01
    phone:
      type: string
      example: +8801712345678
    email:
      type: string
      format: email
      example: [EMAIL_ADDRESS]
    address:
      type: string
      example: Dhaka, Bangladesh
