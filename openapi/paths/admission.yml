create-admission:
  tags: [Admission]
  summary: New admission
  description: Create new admission
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/admission.yml#/AdmissionRequest"
  responses:
    "200":
      description: Admission created successfully
      content:
        application/json:
          schema:
            $ref: "../components/schemas/auth.yml#/LoginResponse"
    "400":
      $ref: "../components/responses/common.yml#/ValidationError"
    "401":
      description: Wrong credentials
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yml#/ErrorResponse"
    "403":
      description: Account not active/approved
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yml#/ErrorResponse"
    "404":
      $ref: "../components/responses/common.yml#/NotFound"
    "500":
      $ref: "../components/responses/common.yml#/ServerError"

get-admissions:
  tags: [Admission]
  summary: Get all admissions
  description: Get all admissions
  security:
    - BearerAuth: []
  responses:
    "200":
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              data:
                type: array
                items:
                  $ref: "../components/schemas/admission.yml#/Admission"
    "401":
      $ref: "../components/responses/common.yml#/Unauthorized"
    "403":
      $ref: "../components/responses/common.yml#/Forbidden"
    "500":
      $ref: "../components/responses/common.yml#/ServerError"

get-admission:
  tags: [Admission]
  summary: Get admission by ID
  description: Get admission by ID
  operationId: getAdmission
  security:
    - BearerAuth: []
  parameters:
    - $ref: "../components/parameters/common.yml#/IdParam"
  responses:
    "200":
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "../components/schemas/admission.yml#/Admission"
    "401":
      $ref: "../components/responses/common.yml#/Unauthorized"
    "403":
      $ref: "../components/responses/common.yml#/Forbidden"
    "500":
      $ref: "../components/responses/common.yml#/ServerError"

update-admission:
  tags: [Admission]
  summary: Update admission
  description: Update admission
  security:
    - BearerAuth: []
  parameters:
    - in: path
      name: id
      schema:
        type: integer
      required: true
      example: 1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/admission.yml#/AdmissionRequest"
  responses:
    "200":
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "../components/schemas/admission.yml#/Admission"
    "401":
      $ref: "../components/responses/common.yml#/Unauthorized"
    "403":
      $ref: "../components/responses/common.yml#/Forbidden"
    "500":
      $ref: "../components/responses/common.yml#/ServerError"

delete-admission:
  tags: [Admission]
  summary: Delete admission
  description: Delete admission
  security:
    - BearerAuth: []
  parameters:
    - $ref: "../components/parameters/common.yml#/IdParam"
  responses:
    "200":
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "../components/schemas/admission.yml#/Admission"
    "401":
      $ref: "../components/responses/common.yml#/Unauthorized"
    "403":
      $ref: "../components/responses/common.yml#/Forbidden"
    "500":
      $ref: "../components/responses/common.yml#/ServerError"
