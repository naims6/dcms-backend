  # postgres service
  dcms_postgres:
    image: postgres:17-alpine
    container_name: postgres_dcms
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dcms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./postgres-data:/var/lib/postgresql/data # bind mount for local development
    restart: always

  # pg admin
  dcms_pg_admin:
    image: dpage/pgadmin4
    container_name: pg_admin_dcms
    environment:
      PGADMIN_DEFAULT_EMAIL: naimsorker6@gmail.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - dcms_postgres
    restart: always

  # redis
  dcms_redis:
    image: redis:7-alpine
    container_name: redis_dcms
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # redis insight
  dcms_redis_insight:
    image: redis/redisinsight:3.4.2
    container_name: redis_insight_dcms
    ports:
      - "5540:5540"
    depends_on:
      - dcms_redis
    volumes:
      - redis_insight_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  redis_insight_data:
