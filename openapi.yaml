openapi: 3.0.0
info:
  title: My First API
  version: 1.0.0

paths:
  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Success
          content:
            application/json:
              example:
                id: 1
                name: John
        404:
          description: User not found
